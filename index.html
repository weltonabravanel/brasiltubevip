
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página Black</title>
    <style>
        /* O segredo do fundo preto e texto claro está aqui */
        body {
            background-color: #000000; /* Cor de fundo preta */
            color: #ffffff;           /* Cor do texto branca para dar contraste */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            border: 1px solid #333333; /* Uma borda sutil cinza escuro */
            padding: 30px;
            border-radius: 8px;
            background-color: #111111; /* Um fundo levemente cinza para destacar o box */
        }

        h1 {
            color: #00ff88; /* Um tom de verde neon para dar destaque */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Olá, Mundo!</h1>
        <p>Esta é uma página HTML com o fundo totalmente preto.</p>
    </div>

</body>
</html>
