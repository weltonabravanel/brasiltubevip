 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexão de Verdade - Starlink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Efeito sutil de fundo estrelado */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.3;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 400;
            color: #8a8a8a;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .logo-link {
            display: inline-block;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .logo-link:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }

        .logo-starlink {
            width: 100%;
            max-width: 350px;
            height: auto;
            display: block;
        }

        .hint {
            margin-top: 35px;
            font-size: 0.9rem;
            color: #8a8a8a;
            letter-spacing: 1px;
        }

        #contador {
            font-weight: bold;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Conexão de Verdade</h1>
        <h2>Starlink</h2>
        
        <a href="https://starlink.com/br" class="logo-link" title="Ir para o site oficial da Starlink">
            <img src="https://starlink.com/assets/images/logo/logo_white.png" alt="Logo Starlink" class="logo-starlink">
        </a>

        <p class="hint">Redirecionando em de verdade em <span id="contador">5</span> segundos...</p>
    </div>

    <script>
        // Configurações do redirecionamento
        const urlDestino = "https://starlink.com/br";
        let tempoRestante = 5;
        
        const elementoContador = document.getElementById('contador');

        // Atualiza o contador na tela a cada 1 segundo
        const intervalo = setInterval(() => {
            tempoRestante--;
            elementoContador.textContent = tempoRestante;

            // Quando zerar, redireciona a página na mesma aba
            if (tempoRestante <= 0) {
                clearInterval(intervalo);
                window.location.href = urlDestino;
            }
        }, 1000);
    </script>

</body>
</html>
