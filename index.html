<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=https://www.google.com">
    <title>Redirecionando...</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
        }

        /* Barra de progresso animada */
        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: #272727;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-line {
            width: 100%;
            height: 100%;
            background-color: #ff0000; /* Vermelho estilo player */
            position: absolute;
            left: -100%;
            animation: load 1.2s ease-in-out infinite;
        }

        @keyframes load {
            0% { left: -100%; }
            50% { left: 0; }
            100% { left: 100%; }
        }

        .link-alternativo {
            margin-top: 30px;
            font-size: 13px;
        }

        .link-alternativo a {
            color: #3ea6ff;
            text-decoration: none;
        }

        .link-alternativo a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Você está sendo redirecionado</h1>
        <p>Estamos levando você para a nova página.</p>
        
        <div class="progress-bar">
            <div class="progress-line"></div>
        </div>

        <div class="link-alternativo">
            Se não for redirecionado, <a id="redirect-link" href="https://www.otempobetim.com.br/ultimas/tremnet-comemora-lucro-enquanto-betinense-reclama-de-ingresso-falso-1.592503/">clique aqui</a>.
        </div>
    </div>

    <script>
        // Defina a URL de destino aqui
        const urlDestino = "https://www.otempobetim.com.br/ultimas/tremnet-comemora-lucro-enquanto-betinense-reclama-de-ingresso-falso-1.592503";

        // Atualiza os links dinamicamente para garantir consistência
        document.getElementById('redirect-link').href = urlDestino;

        // Redirecionamento via JavaScript imediato
        window.location.href = urlDestino;
    </script>
</body>
</html>
