<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeira dos EUA Tremulando</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container da bandeira para dar estabilidade e perspectiva */
        .flag-container {
            perspective: 1000px;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.7));
        }

        /* Estrutura principal da bandeira */
        .usa-flag {
            position: relative;
            width: 380px;
            height: 200px;
            background: linear-gradient(#b22234 50%, #ffffff 50%);
            background-size: 100% 30.76px; /* Altura exata das 13 listras */
            transform-style: preserve-3d;
            animation: wave 4s ease-in-out infinite alternate;
        }

        /* O retângulo azul (Canton) */
        .canton {
            position: absolute;
            top: 0;
            left: 0;
            width: 152px; /* 40% da largura */
            height: 107.6px; /* Altura de 7 listras */
            background-color: #3c3b6e;
            padding: 6px 4px;
            display: grid;
            grid-template-rows: repeat(9, 1fr);
            gap: 2px;
        }

        /* Linhas de estrelas (simplificadas para o efeito visual) */
        .star-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .star-row.short {
            padding: 0 8px;
        }

        /* Criando as estrelas usando CSS puro */
        .star {
            position: relative;
            display: inline-block;
            width: 0;
            height: 0;
            border-right: 5px solid transparent;
            border-bottom: 3.5px solid #ffffff;
            border-left: 5px solid transparent;
            transform: rotate(35deg);
        }

        .star::before {
            content: '';
            position: absolute;
            top: -2.5px;
            left: -3.2px;
            display: inline-block;
            width: 0;
            height: 0;
            border-right: 1.5px solid transparent;
            border-bottom: 4px solid #ffffff;
            border-left: 1.5px solid transparent;
            transform: rotate(-35deg);
        }

        .star::after {
            content: '';
            position: absolute;
            top: 0;
            left: -5px;
            display: inline-block;
            width: 0;
            height: 0;
            border-right: 5px solid transparent;
            border-bottom: 3.5px solid #ffffff;
            border-left: 5px solid transparent;
            transform: rotate(-70deg);
        }

        /* Camada de sombra que simula as dobras do tecido tremendo */
        .flag-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                45deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.15) 25%,
                rgba(0, 0, 0, 0.25) 50%,
                rgba(255, 255, 255, 0.15) 75%,
                rgba(0, 0, 0, 0.3) 100%
            );
            background-size: 200% 100%;
            animation: wind-shadow 4s ease-in-out infinite alternate;
            pointer-events: none;
        }

        /* Mastro da bandeira */
        .flagpole {
            position: absolute;
            left: -15px;
            top: -20px;
            width: 15px;
            height: 450px;
            background: linear-gradient(90deg, #555, #888, #333);
            border-radius: 4px 0 0 4px;
        }

        .flagpole-knob {
            position: absolute;
            top: -32px;
            left: -18px;
            width: 21px;
            height: 21px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border-radius: 50%;
        }

        /* ANIMAÇÕES */
        
        /* Movimento 3D da bandeira */
        @keyframes wave {
            0% {
                transform: rotateY(0deg) rotateX(0deg) skewY(0deg);
            }
            50% {
                transform: rotateY(15deg) rotateX(5deg) skewY(-2deg) scaleX(0.98);
            }
            100% {
                transform: rotateY(-10deg) rotateX(-5deg) skewY(3deg);
            }
        }

        /* Movimento das sombras para simular ondulação */
        @keyframes wind-shadow {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }
    </style>
</head>
<body>

    <div style="position: relative;">
        <div class="flagpole-knob"></div>
        <div class="flagpole"></div>

        <div class="flag-container">
            <div class="usa-flag">
                <div class="canton">
                    <div class="star-row"><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div></div>
                    <div class="star-row short"><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div></div>
                    <div class="star-row"><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div></div>
                    <div class="star-row short"><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div></div>
                    <div class="star-row"><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div></div>
                    <div class="star-row short"><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div></div>
                    <div class="star-row"><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div></div>
                    <div class="star-row short"><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div></div>
                    <div class="star-row"><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div></div>
                </div>
                <div class="flag-overlay"></div>
            </div>
        </div>
    </div>

</body>
</html>
